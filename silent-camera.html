<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>静音カメラ</title>
<style>
  :root {
    --bg: #000000;
    --ink: #F2EFE9;
    --dim: #8A867E;
    --brass: #D9A441;
    --line: #26241F;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
    overflow: hidden;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ---------- viewfinder ---------- */
  #stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: var(--bg);
  }
  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform-origin: center center;
  }

  /* ---------- top bar ---------- */
  #topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: calc(env(safe-area-inset-top) + 10px) 16px 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 10;
    pointer-events: none;
    background: linear-gradient(to bottom, rgba(0,0,0,0.55), rgba(0,0,0,0));
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--dim);
    font-variant-numeric: tabular-nums;
  }
  .badge .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--brass);
  }
  #netBadge { color: var(--ink); }
  #zoomBadge { color: var(--brass); font-weight: 600; }

  /* ---------- bottom controls ---------- */
  #controls {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 18px 28px calc(env(safe-area-inset-bottom) + 26px);
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    z-index: 10;
    background: linear-gradient(to top, rgba(0,0,0,0.6), rgba(0,0,0,0));
  }
  #thumbWrap {
    justify-self: start;
    width: 52px; height: 52px;
    border-radius: 10px;
    border: 1px solid var(--line);
    overflow: hidden;
    background: #0C0B09;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #thumb { width: 100%; height: 100%; object-fit: cover; display: none; }
  #thumbEmpty { font-size: 10px; color: var(--dim); letter-spacing: 0.1em; }

  #shutter {
    justify-self: center;
    width: 76px; height: 76px;
    border-radius: 50%;
    border: 3px solid var(--ink);
    background: transparent;
    position: relative;
    cursor: pointer;
  }
  #shutter::after {
    content: "";
    position: absolute;
    inset: 5px;
    border-radius: 50%;
    background: var(--ink);
    transition: transform 0.08s ease, background 0.08s ease;
  }
  #shutter:active::after {
    transform: scale(0.86);
    background: var(--brass);
  }

  #flip {
    justify-self: end;
    width: 52px; height: 52px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: rgba(20,19,16,0.7);
    color: var(--ink);
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ---------- capture flash ---------- */
  #flash {
    position: fixed;
    inset: 0;
    background: #000;
    opacity: 0;
    pointer-events: none;
    z-index: 20;
  }
  #flash.fire { animation: flashAnim 0.18s ease-out; }
  @keyframes flashAnim {
    0% { opacity: 0.9; }
    100% { opacity: 0; }
  }

  /* ---------- review overlay ---------- */
  #review {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 30;
    display: none;
    flex-direction: column;
  }
  #review.open { display: flex; }
  #reviewImg {
    flex: 1;
    min-height: 0;
    object-fit: contain;
    width: 100%;
    background: #050505;
  }
  #reviewBar {
    display: flex;
    gap: 12px;
    padding: 16px 20px calc(env(safe-area-inset-bottom) + 20px);
  }
  .btn {
    flex: 1;
    padding: 15px 0;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.05em;
    border: 1px solid var(--line);
    background: #14130F;
    color: var(--ink);
    cursor: pointer;
  }
  .btn.primary {
    background: var(--brass);
    border-color: var(--brass);
    color: #171204;
  }

  /* ---------- error screen ---------- */
  #error {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 40;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
    text-align: center;
    gap: 14px;
  }
  #error.open { display: flex; }
  #error h2 { font-size: 17px; font-weight: 600; }
  #error p { font-size: 13px; line-height: 1.9; color: var(--dim); max-width: 30em; }

  @media (prefers-reduced-motion: reduce) {
    #flash.fire { animation: none; }
    #shutter::after { transition: none; }
  }
</style>
</head>
<body>

<div id="stage"><video id="video" autoplay playsinline muted></video></div>

<div id="topbar">
  <span class="badge" id="netBadge"><span class="dot"></span>通信 0 · 完全ローカル</span>
  <span class="badge" id="zoomBadge">1.0×</span>
  <span class="badge" id="resBadge">--</span>
</div>

<div id="controls">
  <div id="thumbWrap">
    <img id="thumb" alt="直前の写真">
    <span id="thumbEmpty">未撮影</span>
  </div>
  <button id="shutter" aria-label="撮影"></button>
  <button id="flip" aria-label="カメラ切り替え">&#8635;</button>
</div>

<div id="flash"></div>

<div id="review">
  <img id="reviewImg" alt="撮影した写真">
  <div id="reviewBar">
    <button class="btn" id="closeReview">閉じる</button>
    <button class="btn primary" id="saveBtn">保存</button>
  </div>
</div>

<div id="error">
  <h2>カメラを起動できません</h2>
  <p id="errorMsg"></p>
</div>

<script>
(() => {
  "use strict";

  const video = document.getElementById("video");
  const shutter = document.getElementById("shutter");
  const flipBtn = document.getElementById("flip");
  const flash = document.getElementById("flash");
  const thumb = document.getElementById("thumb");
  const thumbEmpty = document.getElementById("thumbEmpty");
  const thumbWrap = document.getElementById("thumbWrap");
  const review = document.getElementById("review");
  const reviewImg = document.getElementById("reviewImg");
  const saveBtn = document.getElementById("saveBtn");
  const closeReview = document.getElementById("closeReview");
  const zoomBadge = document.getElementById("zoomBadge");
  const resBadge = document.getElementById("resBadge");
  const errorBox = document.getElementById("error");
  const errorMsg = document.getElementById("errorMsg");

  let stream = null;
  let track = null;
  let facing = "environment";   // 背面から開始
  let zoom = 1;                 // 現在のズーム倍率
  let zoomCap = null;           // ハードウェアズームの対応範囲
  let lastBlob = null;          // 直前の撮影データ
  let lastUrl = null;

  // ---------- カメラ起動 ----------
  async function startCamera() {
    stopCamera();
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        audio: false,
        video: {
          facingMode: facing,
          width:  { ideal: 4096 },
          height: { ideal: 2160 }
        }
      });
    } catch (e) {
      showError(e);
      return;
    }
    track = stream.getVideoTracks()[0];
    video.srcObject = stream;

    // 前面カメラは鏡像表示(保存時は補正)
    applyViewTransform();

    // ハードウェアズーム対応チェック
    zoomCap = null;
    if (track.getCapabilities) {
      const caps = track.getCapabilities();
      if (caps.zoom) zoomCap = caps.zoom; // {min, max, step}
    }
    setZoom(1);

    video.addEventListener("loadedmetadata", updateResBadge, { once: true });
  }

  function stopCamera() {
    if (stream) {
      stream.getTracks().forEach(t => t.stop());
      stream = null;
      track = null;
    }
  }

  function updateResBadge() {
    if (video.videoWidth) {
      resBadge.textContent = video.videoWidth + "×" + video.videoHeight;
    }
  }

  function showError(e) {
    errorBox.classList.add("open");
    let msg = "";
    if (e && (e.name === "NotAllowedError" || e.name === "PermissionDeniedError")) {
      msg = "カメラへのアクセスが許可されていません。アドレスバー横の設定、またはiOSの「設定 > Safari > カメラ」から許可してください。";
    } else if (location.protocol === "file:" || (location.protocol === "http:" && location.hostname !== "localhost")) {
      msg = "ブラウザのカメラAPIはHTTPS(またはlocalhost)でのみ動作します。GitHub Pagesなどに置いてhttpsのURLで開いてください。";
    } else {
      msg = "エラー: " + (e && e.message ? e.message : e);
    }
    errorMsg.textContent = msg;
  }

  // ---------- ズーム ----------
  function setZoom(z) {
    const maxZ = zoomCap ? Math.min(zoomCap.max, 10) : 5;
    zoom = Math.min(Math.max(z, 1), maxZ);
    if (zoomCap && track) {
      // ハードウェア(センサー)ズーム
      track.applyConstraints({ advanced: [{ zoom: zoom }] }).catch(() => {});
      video.style.transform = facing === "user" ? "scaleX(-1)" : "";
    } else {
      // デジタルズーム: 表示はCSS拡大、保存時に中央を切り出し
      applyViewTransform();
    }
    zoomBadge.textContent = zoom.toFixed(1) + "×";
  }

  function applyViewTransform() {
    const mirror = facing === "user" ? " scaleX(-1)" : "";
    const scale = zoomCap ? "" : " scale(" + zoom + ")";
    video.style.transform = (scale + mirror).trim() || "none";
  }

  // ピンチ操作
  let pinchStartDist = 0;
  let pinchStartZoom = 1;
  document.getElementById("stage").addEventListener("touchstart", (ev) => {
    if (ev.touches.length === 2) {
      pinchStartDist = touchDist(ev);
      pinchStartZoom = zoom;
    }
  }, { passive: true });
  document.getElementById("stage").addEventListener("touchmove", (ev) => {
    if (ev.touches.length === 2 && pinchStartDist > 0) {
      ev.preventDefault();
      setZoom(pinchStartZoom * (touchDist(ev) / pinchStartDist));
    }
  }, { passive: false });
  function touchDist(ev) {
    const dx = ev.touches[0].clientX - ev.touches[1].clientX;
    const dy = ev.touches[0].clientY - ev.touches[1].clientY;
    return Math.hypot(dx, dy);
  }

  // ---------- 撮影 ----------
  function capture() {
    if (!video.videoWidth) return;
    flash.classList.remove("fire");
    void flash.offsetWidth; // アニメーション再始動
    flash.classList.add("fire");

    const vw = video.videoWidth;
    const vh = video.videoHeight;
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    if (zoomCap || zoom === 1) {
      // ハードウェアズーム or 等倍: フレームをそのまま保存
      canvas.width = vw;
      canvas.height = vh;
      drawFrame(ctx, 0, 0, vw, vh, vw, vh);
    } else {
      // デジタルズーム: 中央をズーム倍率で切り出し
      const cw = Math.round(vw / zoom);
      const ch = Math.round(vh / zoom);
      canvas.width = cw;
      canvas.height = ch;
      drawFrame(ctx, (vw - cw) / 2, (vh - ch) / 2, cw, ch, cw, ch);
    }

    function drawFrame(c, sx, sy, sw, sh, dw, dh) {
      if (facing === "user") {
        // 前面カメラ: 鏡像を補正して保存
        c.translate(dw, 0);
        c.scale(-1, 1);
      }
      c.drawImage(video, sx, sy, sw, sh, 0, 0, dw, dh);
    }

    canvas.toBlob((blob) => {
      if (!blob) return;
      lastBlob = blob;
      if (lastUrl) URL.revokeObjectURL(lastUrl);
      lastUrl = URL.createObjectURL(blob);
      thumb.src = lastUrl;
      thumb.style.display = "block";
      thumbEmpty.style.display = "none";
    }, "image/jpeg", 0.92);
  }

  // ---------- 保存 ----------
  async function savePhoto() {
    if (!lastBlob) return;
    const name = "photo-" + timestamp() + ".jpg";
    const file = new File([lastBlob], name, { type: "image/jpeg" });

    // iOSでは共有シート経由で「画像を保存」→写真アプリに入る
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({ files: [file] });
        return;
      } catch (e) {
        if (e.name === "AbortError") return; // ユーザーがキャンセル
      }
    }
    // フォールバック: ダウンロード(Filesアプリ/PCのダウンロードへ)
    const a = document.createElement("a");
    a.href = lastUrl;
    a.download = name;
    a.click();
  }

  function timestamp() {
    const d = new Date();
    const p = (n) => String(n).padStart(2, "0");
    return d.getFullYear() + p(d.getMonth() + 1) + p(d.getDate()) +
           "-" + p(d.getHours()) + p(d.getMinutes()) + p(d.getSeconds());
  }

  // ---------- イベント ----------
  shutter.addEventListener("click", capture);
  flipBtn.addEventListener("click", () => {
    facing = facing === "environment" ? "user" : "environment";
    startCamera();
  });
  thumbWrap.addEventListener("click", () => {
    if (!lastUrl) return;
    reviewImg.src = lastUrl;
    review.classList.add("open");
  });
  closeReview.addEventListener("click", () => review.classList.remove("open"));
  saveBtn.addEventListener("click", savePhoto);

  // バックグラウンド時はカメラを止める(プライバシー+電池)
  document.addEventListener("visibilitychange", () => {
    if (document.hidden) stopCamera();
    else startCamera();
  });

  startCamera();
})();
</script>
</body>
</html>
