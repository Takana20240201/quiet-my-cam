<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>静音カメラ</title>
<style>
  :root {
    --bg: #000000;
    --ink: #F2EFE9;
    --dim: #8A867E;
    --brass: #D9A441;
    --line: #26241F;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
    overflow: hidden;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ---------- viewfinder ---------- */
  #stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: var(--bg);
  }
  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform-origin: center center;
  }

  /* ---------- top bar ---------- */
  #topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: calc(env(safe-area-inset-top) + 10px) 16px 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 10;
    pointer-events: none;
    background: linear-gradient(to bottom, rgba(0,0,0,0.55), rgba(0,0,0,0));
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--dim);
    font-variant-numeric: tabular-nums;
  }
  .badge .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--brass);
  }
  #netBadge { color: var(--ink); }
  #zoomBadge { color: var(--brass); font-weight: 600; }

  /* ---------- bottom controls ---------- */
  #controls {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 18px 28px calc(env(safe-area-inset-bottom) + 26px);
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    z-index: 10;
    background: linear-gradient(to top, rgba(0,0,0,0.6), rgba(0,0,0,0));
  }
  #thumbWrap {
    justify-self: start;
    width: 52px; height: 52px;
    border-radius: 10px;
    border: 1px solid var(--line);
    overflow: visible;
    background: #0C0B09;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  #thumb {
    width: 100%; height: 100%;
    object-fit: cover;
    display: none;
    border-radius: 9px;
  }
  #thumbEmpty { font-size: 10px; color: var(--dim); letter-spacing: 0.1em; }
  #thumbCount {
    position: absolute;
    top: -7px; right: -7px;
    min-width: 20px; height: 20px;
    padding: 0 5px;
    border-radius: 10px;
    background: var(--brass);
    color: #171204;
    font-size: 12px;
    font-weight: 700;
    display: none;
    align-items: center;
    justify-content: center;
    font-variant-numeric: tabular-nums;
  }

  #shutter {
    justify-self: center;
    width: 76px; height: 76px;
    border-radius: 50%;
    border: 3px solid var(--ink);
    background: transparent;
    position: relative;
    cursor: pointer;
  }
  #shutter::after {
    content: "";
    position: absolute;
    inset: 5px;
    border-radius: 50%;
    background: var(--ink);
    transition: transform 0.08s ease, background 0.08s ease;
  }
  #shutter:active::after {
    transform: scale(0.86);
    background: var(--brass);
  }

  #flip {
    justify-self: end;
    width: 52px; height: 52px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: rgba(20,19,16,0.7);
    color: var(--ink);
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ---------- capture flash ---------- */
  #flash {
    position: fixed;
    inset: 0;
    background: #000;
    opacity: 0;
    pointer-events: none;
    z-index: 20;
  }
  #flash.fire { animation: flashAnim 0.18s ease-out; }
  @keyframes flashAnim {
    0% { opacity: 0.9; }
    100% { opacity: 0; }
  }

  /* ---------- gallery overlay ---------- */
  #gallery {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 30;
    display: none;
    flex-direction: column;
  }
  #gallery.open { display: flex; }
  #galleryHead {
    padding: calc(env(safe-area-inset-top) + 14px) 20px 12px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: var(--ink);
    border-bottom: 1px solid var(--line);
    font-variant-numeric: tabular-nums;
  }
  #grid {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 3px;
    padding: 3px;
    align-content: start;
  }
  .gitem {
    aspect-ratio: 3 / 4;
    overflow: hidden;
    background: #0C0B09;
    border: none;
    padding: 0;
    cursor: pointer;
  }
  .gitem img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  #galleryBar {
    display: flex;
    gap: 10px;
    padding: 14px 16px calc(env(safe-area-inset-bottom) + 18px);
    border-top: 1px solid var(--line);
  }
  .btn {
    flex: 1;
    padding: 15px 0;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.05em;
    border: 1px solid var(--line);
    background: #14130F;
    color: var(--ink);
    cursor: pointer;
  }
  .btn.primary {
    background: var(--brass);
    border-color: var(--brass);
    color: #171204;
  }
  .btn.danger { color: #E06C5A; }

  /* ---------- single photo viewer ---------- */
  #viewer {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 40;
    display: none;
    flex-direction: column;
  }
  #viewer.open { display: flex; }
  #viewerImg {
    flex: 1;
    min-height: 0;
    object-fit: contain;
    width: 100%;
    background: #050505;
  }
  #viewerBar {
    display: flex;
    gap: 10px;
    padding: 14px 16px calc(env(safe-area-inset-bottom) + 18px);
  }

  /* ---------- error screen ---------- */
  #error {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 50;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
    text-align: center;
    gap: 14px;
  }
  #error.open { display: flex; }
  #error h2 { font-size: 17px; font-weight: 600; }
  #error p { font-size: 13px; line-height: 1.9; color: var(--dim); max-width: 30em; }

  @media (prefers-reduced-motion: reduce) {
    #flash.fire { animation: none; }
    #shutter::after { transition: none; }
  }
</style>
</head>
<body>

<div id="stage"><video id="video" autoplay playsinline muted></video></div>

<div id="topbar">
  <span class="badge" id="netBadge"><span class="dot"></span>通信 0 · 完全ローカル</span>
  <span class="badge" id="zoomBadge">1.0×</span>
  <span class="badge" id="resBadge">--</span>
</div>

<div id="controls">
  <button id="thumbWrap" aria-label="撮影した写真を見る">
    <img id="thumb" alt="">
    <span id="thumbEmpty">未撮影</span>
    <span id="thumbCount">0</span>
  </button>
  <button id="shutter" aria-label="撮影"></button>
  <button id="flip" aria-label="カメラ切り替え">&#8635;</button>
</div>

<div id="flash"></div>

<div id="gallery">
  <div id="galleryHead">写真</div>
  <div id="grid"></div>
  <div id="galleryBar">
    <button class="btn" id="closeGallery">閉じる</button>
    <button class="btn danger" id="deleteAllBtn">すべて削除</button>
    <button class="btn primary" id="saveAllBtn">すべて保存</button>
  </div>
</div>

<div id="viewer">
  <img id="viewerImg" alt="撮影した写真">
  <div id="viewerBar">
    <button class="btn" id="closeViewer">戻る</button>
    <button class="btn danger" id="deleteOneBtn">削除</button>
    <button class="btn primary" id="saveOneBtn">保存</button>
  </div>
</div>

<div id="error">
  <h2>カメラを起動できません</h2>
  <p id="errorMsg"></p>
</div>

<script>
(() => {
  "use strict";

  const video = document.getElementById("video");
  const shutter = document.getElementById("shutter");
  const flipBtn = document.getElementById("flip");
  const flash = document.getElementById("flash");
  const thumb = document.getElementById("thumb");
  const thumbEmpty = document.getElementById("thumbEmpty");
  const thumbCount = document.getElementById("thumbCount");
  const thumbWrap = document.getElementById("thumbWrap");
  const gallery = document.getElementById("gallery");
  const galleryHead = document.getElementById("galleryHead");
  const grid = document.getElementById("grid");
  const viewer = document.getElementById("viewer");
  const viewerImg = document.getElementById("viewerImg");
  const zoomBadge = document.getElementById("zoomBadge");
  const resBadge = document.getElementById("resBadge");
  const errorBox = document.getElementById("error");
  const errorMsg = document.getElementById("errorMsg");

  let stream = null;
  let track = null;
  let facing = "environment";   // 背面から開始
  let zoom = 1;                 // 現在のズーム倍率
  let zoomCap = null;           // ハードウェアズームの対応範囲
  let photos = [];              // 撮影した写真 {blob, url, name} を全部保持
  let viewIndex = -1;           // ビューワーで表示中の写真番号

  // ---------- カメラ起動 ----------
  async function startCamera() {
    stopCamera();
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        audio: false,
        video: {
          facingMode: facing,
          width:  { ideal: 4096 },
          height: { ideal: 2160 }
        }
      });
    } catch (e) {
      showError(e);
      return;
    }
    track = stream.getVideoTracks()[0];
    video.srcObject = stream;

    applyViewTransform();

    zoomCap = null;
    if (track.getCapabilities) {
      const caps = track.getCapabilities();
      if (caps.zoom) zoomCap = caps.zoom; // {min, max, step}
    }
    setZoom(1);

    video.addEventListener("loadedmetadata", updateResBadge, { once: true });
  }

  function stopCamera() {
    if (stream) {
      stream.getTracks().forEach(t => t.stop());
      stream = null;
      track = null;
    }
  }

  function updateResBadge() {
    if (video.videoWidth) {
      resBadge.textContent = video.videoWidth + "×" + video.videoHeight;
    }
  }

  function showError(e) {
    errorBox.classList.add("open");
    let msg = "";
    if (e && (e.name === "NotAllowedError" || e.name === "PermissionDeniedError")) {
      msg = "カメラへのアクセスが許可されていません。アドレスバー横の設定、またはiOSの「設定 > Safari > カメラ」から許可してください。";
    } else if (location.protocol === "file:" || (location.protocol === "http:" && location.hostname !== "localhost")) {
      msg = "ブラウザのカメラAPIはHTTPS(またはlocalhost)でのみ動作します。GitHub PagesなどのhttpsのURLで開いてください。";
    } else {
      msg = "エラー: " + (e && e.message ? e.message : e);
    }
    errorMsg.textContent = msg;
  }

  // ---------- ズーム ----------
  function setZoom(z) {
    const maxZ = zoomCap ? Math.min(zoomCap.max, 10) : 5;
    zoom = Math.min(Math.max(z, 1), maxZ);
    if (zoomCap && track) {
      track.applyConstraints({ advanced: [{ zoom: zoom }] }).catch(() => {});
      video.style.transform = facing === "user" ? "scaleX(-1)" : "";
    } else {
      applyViewTransform();
    }
    zoomBadge.textContent = zoom.toFixed(1) + "×";
  }

  function applyViewTransform() {
    const mirror = facing === "user" ? " scaleX(-1)" : "";
    const scale = zoomCap ? "" : " scale(" + zoom + ")";
    video.style.transform = (scale + mirror).trim() || "none";
  }

  // ピンチ操作
  let pinchStartDist = 0;
  let pinchStartZoom = 1;
  const stage = document.getElementById("stage");
  stage.addEventListener("touchstart", (ev) => {
    if (ev.touches.length === 2) {
      pinchStartDist = touchDist(ev);
      pinchStartZoom = zoom;
    }
  }, { passive: true });
  stage.addEventListener("touchmove", (ev) => {
    if (ev.touches.length === 2 && pinchStartDist > 0) {
      ev.preventDefault();
      setZoom(pinchStartZoom * (touchDist(ev) / pinchStartDist));
    }
  }, { passive: false });
  function touchDist(ev) {
    const dx = ev.touches[0].clientX - ev.touches[1].clientX;
    const dy = ev.touches[0].clientY - ev.touches[1].clientY;
    return Math.hypot(dx, dy);
  }

  // ---------- 撮影 ----------
  function capture() {
    if (!video.videoWidth) return;
    flash.classList.remove("fire");
    void flash.offsetWidth;
    flash.classList.add("fire");

    const vw = video.videoWidth;
    const vh = video.videoHeight;
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    if (zoomCap || zoom === 1) {
      canvas.width = vw;
      canvas.height = vh;
      drawFrame(ctx, 0, 0, vw, vh, vw, vh);
    } else {
      // デジタルズーム: 中央をズーム倍率で切り出し
      const cw = Math.round(vw / zoom);
      const ch = Math.round(vh / zoom);
      canvas.width = cw;
      canvas.height = ch;
      drawFrame(ctx, (vw - cw) / 2, (vh - ch) / 2, cw, ch, cw, ch);
    }

    function drawFrame(c, sx, sy, sw, sh, dw, dh) {
      if (facing === "user") {
        c.translate(dw, 0);
        c.scale(-1, 1);
      }
      c.drawImage(video, sx, sy, sw, sh, 0, 0, dw, dh);
    }

    canvas.toBlob((blob) => {
      if (!blob) return;
      photos.push({
        blob: blob,
        url: URL.createObjectURL(blob),
        name: "photo-" + timestamp() + "-" + photos.length + ".jpg"
      });
      updateThumb();
    }, "image/jpeg", 0.92);
  }

  function updateThumb() {
    const n = photos.length;
    if (n === 0) {
      thumb.style.display = "none";
      thumbEmpty.style.display = "";
      thumbCount.style.display = "none";
      thumb.src = "";
    } else {
      thumb.src = photos[n - 1].url;
      thumb.style.display = "block";
      thumbEmpty.style.display = "none";
      thumbCount.style.display = "flex";
      thumbCount.textContent = n;
    }
  }

  function timestamp() {
    const d = new Date();
    const p = (n) => String(n).padStart(2, "0");
    return d.getFullYear() + p(d.getMonth() + 1) + p(d.getDate()) +
           "-" + p(d.getHours()) + p(d.getMinutes()) + p(d.getSeconds());
  }

  // ---------- ギャラリー ----------
  function openGallery() {
    if (photos.length === 0) return;
    renderGallery();
    gallery.classList.add("open");
  }

  function renderGallery() {
    galleryHead.textContent = "写真 " + photos.length + "枚";
    grid.innerHTML = "";
    photos.forEach((p, i) => {
      const b = document.createElement("button");
      b.className = "gitem";
      const img = document.createElement("img");
      img.src = p.url;
      img.alt = (i + 1) + "枚目";
      b.appendChild(img);
      b.addEventListener("click", () => openViewer(i));
      grid.appendChild(b);
    });
  }

  function openViewer(i) {
    viewIndex = i;
    viewerImg.src = photos[i].url;
    viewer.classList.add("open");
  }

  function closeViewerFn() {
    viewer.classList.remove("open");
    viewIndex = -1;
  }

  // ---------- 保存 ----------
  function toFile(p) {
    return new File([p.blob], p.name, { type: "image/jpeg" });
  }

  async function sharePhotos(list) {
    const files = list.map(toFile);
    // iOSでは共有シート経由で「画像を保存」→写真アプリにまとめて入る
    if (navigator.canShare && navigator.canShare({ files: files })) {
      try {
        await navigator.share({ files: files });
        return true;
      } catch (e) {
        if (e.name === "AbortError") return false; // キャンセル
      }
    }
    // フォールバック: 順番にダウンロード
    for (const p of list) {
      const a = document.createElement("a");
      a.href = p.url;
      a.download = p.name;
      a.click();
      await new Promise(r => setTimeout(r, 300));
    }
    return true;
  }

  function removePhotos(indices) {
    // 後ろから消して番号ズレを防ぐ
    indices.sort((a, b) => b - a).forEach(i => {
      URL.revokeObjectURL(photos[i].url);
      photos.splice(i, 1);
    });
    updateThumb();
    if (photos.length === 0) {
      gallery.classList.remove("open");
    } else {
      renderGallery();
    }
  }

  // ---------- イベント ----------
  shutter.addEventListener("click", capture);
  flipBtn.addEventListener("click", () => {
    facing = facing === "environment" ? "user" : "environment";
    startCamera();
  });
  thumbWrap.addEventListener("click", openGallery);
  document.getElementById("closeGallery").addEventListener("click", () => gallery.classList.remove("open"));
  document.getElementById("saveAllBtn").addEventListener("click", () => sharePhotos(photos));
  document.getElementById("deleteAllBtn").addEventListener("click", () => {
    if (confirm("撮影した " + photos.length + " 枚をすべて削除しますか?(保存していないものは戻せません)")) {
      removePhotos(photos.map((_, i) => i));
    }
  });
  document.getElementById("closeViewer").addEventListener("click", closeViewerFn);
  document.getElementById("saveOneBtn").addEventListener("click", () => {
    if (viewIndex >= 0) sharePhotos([photos[viewIndex]]);
  });
  document.getElementById("deleteOneBtn").addEventListener("click", () => {
    if (viewIndex >= 0) {
      const i = viewIndex;
      closeViewerFn();
      removePhotos([i]);
    }
  });

  // バックグラウンド時はカメラを止める(プライバシー+電池)
  // 写真はメモリ上に残るのでタブを閉じない限り消えない
  document.addEventListener("visibilitychange", () => {
    if (document.hidden) stopCamera();
    else startCamera();
  });

  // 未保存の写真がある状態でタブを閉じようとしたら警告
  window.addEventListener("beforeunload", (e) => {
    if (photos.length > 0) {
      e.preventDefault();
      e.returnValue = "";
    }
  });

  startCamera();
})();
</script>
</body>
</html>
